<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="718" height="318" rx="16" fill="#14161c" stroke="#23262e"/>
  <text x="28" y="40" fill="#e8eaef" font-size="18" font-weight="600">The three financial statements</text>
  <text x="28" y="64" fill="#6b7280" font-size="12.5">Together they describe a company's health: profit, position, and cash.</text>

  <rect x="40"  y="100" width="200" height="186" rx="14" fill="#1b1e26" stroke="#2a2f3a"/>
  <rect x="260" y="100" width="200" height="186" rx="14" fill="#1b1e26" stroke="#2a2f3a"/>
  <rect x="480" y="100" width="200" height="186" rx="14" fill="#1b1e26" stroke="#2a2f3a"/>

  <!-- income statement -->
  <text x="58" y="134" fill="#10b981" font-size="13.5" font-weight="600">Income statement</text>
  <text x="58" y="168" fill="#cdd2da" font-size="13">Revenue</text>
  <text x="58" y="192" fill="#9aa1ad" font-size="13">− Costs</text>
  <line x1="58" y1="208" x2="222" y2="208" stroke="#2a2f3a"/>
  <text x="58" y="234" fill="#16c784" font-size="13.5" font-weight="600">= Profit</text>
  <text x="58" y="264" fill="#6b7280" font-size="11">Is it making money?</text>

  <!-- balance sheet -->
  <text x="278" y="134" fill="#10b981" font-size="13.5" font-weight="600">Balance sheet</text>
  <text x="278" y="168" fill="#cdd2da" font-size="13">Assets</text>
  <text x="278" y="192" fill="#9aa1ad" font-size="13">− Liabilities</text>
  <line x1="278" y1="208" x2="442" y2="208" stroke="#2a2f3a"/>
  <text x="278" y="234" fill="#16c784" font-size="13.5" font-weight="600">= Equity</text>
  <text x="278" y="264" fill="#6b7280" font-size="11">What it owns vs owes</text>

  <!-- cash flow -->
  <text x="498" y="134" fill="#10b981" font-size="13.5" font-weight="600">Cash flow</text>
  <text x="498" y="168" fill="#cdd2da" font-size="13">Cash in</text>
  <text x="498" y="192" fill="#9aa1ad" font-size="13">− Cash out</text>
  <line x1="498" y1="208" x2="662" y2="208" stroke="#2a2f3a"/>
  <text x="498" y="234" fill="#16c784" font-size="13.5" font-weight="600">= Net cash</text>
  <text x="498" y="264" fill="#6b7280" font-size="11">Real cash movement</text>
</svg>
