<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="718" height="338" rx="16" fill="#14161c" stroke="#23262e"/>
  <text x="28" y="40" fill="#e8eaef" font-size="18" font-weight="600">Why time in the market matters</text>
  <text x="28" y="64" fill="#6b7280" font-size="12.5">Returns compound, so value grows faster the longer you stay invested.</text>

  <!-- axes -->
  <g stroke="#2a2f3a" stroke-width="1">
    <line x1="80" y1="95" x2="80" y2="292"/>
    <line x1="80" y1="292" x2="666" y2="292"/>
  </g>

  <!-- linear reference -->
  <line x1="80" y1="292" x2="660" y2="205" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="648" y="198" fill="#6b7280" font-size="11.5" text-anchor="end">simple / linear</text>

  <!-- compounding curve -->
  <path d="M80,292 C 360,288 520,238 660,98" fill="none" stroke="#10b981" stroke-width="3"/>
  <circle cx="660" cy="98" r="4" fill="#10b981"/>
  <text x="648" y="120" fill="#10b981" font-size="13" font-weight="600" text-anchor="end">Compounding</text>

  <text x="373" y="316" fill="#6b7280" font-size="11.5" text-anchor="middle">Time &#8594;</text>
  <text x="52" y="195" fill="#6b7280" font-size="11.5" text-anchor="middle" transform="rotate(-90 52 195)">Value</text>
</svg>
