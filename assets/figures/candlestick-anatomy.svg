<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="718" height="408" rx="16" fill="#14161c" stroke="#23262e"/>
  <text x="28" y="40" fill="#e8eaef" font-size="18" font-weight="600">Anatomy of a candlestick</text>
  <text x="28" y="64" fill="#6b7280" font-size="12.5">Each candle covers one period and shows four prices (OHLC).</text>

  <!-- leader lines -->
  <g stroke="#3a3f49" stroke-width="1">
    <line x1="165" y1="95" x2="258" y2="95"/>
    <line x1="165" y1="160" x2="233" y2="160"/>
    <line x1="165" y1="300" x2="233" y2="300"/>
    <line x1="165" y1="345" x2="263" y2="345"/>
    <line x1="525" y1="110" x2="595" y2="110"/>
    <line x1="552" y1="165" x2="595" y2="165"/>
    <line x1="552" y1="300" x2="595" y2="300"/>
    <line x1="522" y1="350" x2="595" y2="350"/>
  </g>

  <!-- bullish candle -->
  <line x1="265" y1="95" x2="265" y2="345" stroke="#16c784" stroke-width="3"/>
  <rect x="235" y="160" width="60" height="140" rx="3" fill="#16c784"/>

  <!-- bearish candle -->
  <line x1="520" y1="110" x2="520" y2="350" stroke="#ea3943" stroke-width="3"/>
  <rect x="490" y="165" width="60" height="135" rx="3" fill="#ea3943"/>

  <!-- labels -->
  <g fill="#9aa1ad" font-size="12.5" text-anchor="end">
    <text x="152" y="99">High</text>
    <text x="152" y="164">Close</text>
    <text x="152" y="304">Open</text>
    <text x="152" y="349">Low</text>
  </g>
  <g fill="#9aa1ad" font-size="12.5">
    <text x="602" y="114">High</text>
    <text x="602" y="169">Open</text>
    <text x="602" y="304">Close</text>
    <text x="602" y="354">Low</text>
  </g>

  <text x="265" y="374" fill="#16c784" font-size="13.5" font-weight="600" text-anchor="middle">Bullish</text>
  <text x="265" y="392" fill="#6b7280" font-size="11" text-anchor="middle">close &gt; open</text>
  <text x="520" y="374" fill="#ea3943" font-size="13.5" font-weight="600" text-anchor="middle">Bearish</text>
  <text x="520" y="392" fill="#6b7280" font-size="11" text-anchor="middle">close &lt; open</text>

  <text x="265" y="234" fill="#04130d" font-size="11.5" font-weight="700" text-anchor="middle">body</text>
  <text x="520" y="237" fill="#2a0709" font-size="11.5" font-weight="700" text-anchor="middle">body</text>
</svg>
