<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="718" height="358" rx="16" fill="#14161c" stroke="#23262e"/>
  <text x="28" y="40" fill="#e8eaef" font-size="18" font-weight="600">Who holds your keys?</text>
  <text x="28" y="64" fill="#6b7280" font-size="12.5">The difference between an exchange holding your crypto and holding it yourself.</text>

  <rect x="40"  y="92" width="300" height="240" rx="14" fill="#1b1e26" stroke="#2a2f3a"/>
  <rect x="380" y="92" width="300" height="240" rx="14" fill="#1b1e26" stroke="#2a2f3a"/>

  <!-- left: custodial -->
  <text x="64" y="126" fill="#e8eaef" font-size="15" font-weight="600">On an exchange</text>
  <text x="64" y="146" fill="#6b7280" font-size="12">custodial</text>
  <!-- key glyph (grey) -->
  <g stroke="#9aa1ad" stroke-width="3" fill="none">
    <circle cx="80" cy="192" r="9"/>
    <line x1="89" y1="192" x2="120" y2="192"/>
    <line x1="112" y1="192" x2="112" y2="202"/>
    <line x1="120" y1="192" x2="120" y2="204"/>
  </g>
  <text x="138" y="188" fill="#cdd2da" font-size="13">The exchange holds</text>
  <text x="138" y="207" fill="#cdd2da" font-size="13">your private keys.</text>
  <text x="64" y="262" fill="#9aa1ad" font-size="12.5">Convenient, but you are</text>
  <text x="64" y="281" fill="#9aa1ad" font-size="12.5">trusting a third party with</text>
  <text x="64" y="300" fill="#9aa1ad" font-size="12.5">your funds.</text>

  <!-- right: self-custody -->
  <text x="404" y="126" fill="#e8eaef" font-size="15" font-weight="600">Self-custody wallet</text>
  <g stroke="#10b981" stroke-width="3" fill="none">
    <circle cx="420" cy="170" r="9"/>
    <line x1="429" y1="170" x2="460" y2="170"/>
    <line x1="452" y1="170" x2="452" y2="180"/>
    <line x1="460" y1="170" x2="460" y2="182"/>
  </g>
  <text x="478" y="166" fill="#cdd2da" font-size="13">You hold your keys</text>
  <text x="478" y="185" fill="#cdd2da" font-size="13">via a seed phrase.</text>

  <text x="404" y="232" fill="#6b7280" font-size="11">Your 12–24 word seed phrase</text>
  <g font-size="11.5" fill="#9aa1ad" text-anchor="middle">
    <rect x="404" y="242" width="74" height="28" rx="7" fill="#14161c" stroke="#2a2f3a"/><text x="441" y="260">ocean</text>
    <rect x="488" y="242" width="74" height="28" rx="7" fill="#14161c" stroke="#2a2f3a"/><text x="525" y="260">tiger</text>
    <rect x="572" y="242" width="74" height="28" rx="7" fill="#14161c" stroke="#2a2f3a"/><text x="609" y="260">north…</text>
  </g>
  <text x="404" y="304" fill="#10b981" font-size="12.5" font-weight="600">Not your keys, not your coins.</text>
</svg>
