<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="718" height="378" rx="16" fill="#14161c" stroke="#23262e"/>
  <text x="28" y="40" fill="#e8eaef" font-size="18" font-weight="600">Two classic reversal patterns</text>
  <text x="28" y="64" fill="#6b7280" font-size="12.5">Shapes that often hint a trend is about to turn (never a guarantee).</text>

  <!-- divider -->
  <line x1="360" y1="100" x2="360" y2="330" stroke="#23262e" stroke-width="1"/>

  <!-- double top -->
  <polyline points="60,300 120,165 180,235 245,165 310,300" fill="none" stroke="#cdd2da" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="85" y1="235" x2="300" y2="235" stroke="#e0a44e" stroke-width="1.5" stroke-dasharray="6 5"/>
  <g fill="#ea3943"><circle cx="120" cy="165" r="3.5"/><circle cx="245" cy="165" r="3.5"/></g>
  <text x="185" y="352" fill="#9aa1ad" font-size="13" font-weight="600" text-anchor="middle">Double top</text>
  <text x="305" y="228" fill="#e0a44e" font-size="11" text-anchor="end">neckline</text>

  <!-- head & shoulders -->
  <polyline points="400,300 440,210 485,255 540,150 595,255 645,210 690,300" fill="none" stroke="#cdd2da" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="420" y1="255" x2="672" y2="255" stroke="#e0a44e" stroke-width="1.5" stroke-dasharray="6 5"/>
  <g fill="#ea3943"><circle cx="440" cy="210" r="3.5"/><circle cx="540" cy="150" r="3.5"/><circle cx="645" cy="210" r="3.5"/></g>
  <text x="545" y="352" fill="#9aa1ad" font-size="13" font-weight="600" text-anchor="middle">Head &amp; shoulders</text>
  <text x="540" y="142" fill="#6b7280" font-size="10.5" text-anchor="middle">head</text>
</svg>
